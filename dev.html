<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>already-cal dev</title>
  <link rel="stylesheet" href="dist/already-cal.css">
</head>
<body style="max-width:900px;margin:2em auto;padding:0 1em;">
  <h1>already-cal dev</h1>

  <h2>JS init</h2>
  <div id="already-cal"></div>

  <h2>Data-attribute auto-init</h2>
  <div data-already-cal
       data-default-view="list"
       data-theme-primary="#2e7d32"
       data-theme-font-family="Georgia, serif"
       data-locale="en-US"
       data-week-start-day="1"
       data-max-events-per-day="2"
       data-show-past-events="true"
       data-views="month,list,grid"
       id="already-cal-auto"></div>

  <script src="dist/already-cal.js"></script>
  <script>
    var demoData = {
      events: [
        {
          id: 'rally-april-4',
          title: 'Save Big Bend Rally at the Capitol',
          description: '<p><strong>Rally at the Texas Capitol to Save Big Bend.</strong> Join thousands of Texans at the South Steps.</p>',
          descriptionFormat: 'html',
          location: 'Texas Capitol, South Steps, Austin, TX',
          start: '2026-04-04T16:00:00-05:00',
          end: '2026-04-04T19:00:00-05:00',
          allDay: false,
          image: 'https://nobigbendwall.org/wp-content/uploads/2026/03/SBB_poster_1.png',
          links: [{ label: 'RSVP on Eventbrite', url: 'https://www.eventbrite.com/e/save-big-bend-atx-capitol-rally-44-tickets-1984004583116' }],
          attachments: [],
        },
        {
          id: 'forum-april-12',
          title: 'Border Wall Forum & Film Screening',
          description: 'Join us for a screening of **The River and The Wall** followed by a community forum.',
          descriptionFormat: 'markdown',
          location: 'Crowley Theater, Marfa, TX',
          start: '2026-04-12T19:00:00-05:00',
          end: '2026-04-12T22:00:00-05:00',
          allDay: false,
          image: null,
          links: [],
          attachments: [],
        },
        {
          id: 'past-event',
          title: 'Alpine Border Wall Forum',
          description: 'This event has already happened.',
          descriptionFormat: 'plain',
          location: 'The Granada Theatre, Alpine, TX',
          start: '2026-03-14T19:00:00-05:00',
          end: '2026-03-14T22:00:00-05:00',
          allDay: false,
          image: null,
          links: [],
          attachments: [],
        },
      ],
      calendar: {
        name: 'NBBW PUBLIC WEBSITE',
        timezone: 'America/Chicago',
      },
      generated: new Date().toISOString(),
    };

    // JS init example
    Already.init({
      el: '#already-cal',
      defaultView: 'month',
      locale: 'en-US',
      weekStartDay: 0,
      theme: {
        primary: '#8B4513',
        fontFamily: "'Red Hat Display', sans-serif",
      },
      i18n: {
        back: '\u2190 Go back',
      },
      onViewChange: function(newView, oldView) {
        console.log('View changed:', oldView, '->', newView);
      },
      onEventClick: function(event, view) {
        console.log('Event clicked:', event.title, 'in', view);
      },
      onDataLoad: function(data) {
        console.log('Data loaded:', data.events.length, 'events');
      },
      data: demoData,
    });

    // Auto-init example gets data injected via a global
    // (In real usage, auto-init would use data-fetch-url or data-calendar-id + data-api-key)
    document.getElementById('already-cal-auto')._alreadyCalData = demoData;
  </script>
  <script>
    // Inject data for auto-init demo (auto-init uses data attribute for URL/Google,
    // but for demo we patch it after the fact)
    (function() {
      var el = document.getElementById('already-cal-auto');
      // The auto-init already fired, but since it has no data source, we re-init with data
      Already.init({
        el: '#already-cal-auto',
        defaultView: 'list',
        locale: 'en-US',
        weekStartDay: 1,
        maxEventsPerDay: 2,
        showPastEvents: true,
        views: ['month', 'list', 'grid'],
        theme: {
          primary: '#2e7d32',
          fontFamily: 'Georgia, serif',
        },
        data: demoData,
      });
    })();
  </script>
</body>
</html>
